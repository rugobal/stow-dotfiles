<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Primary Omakub families -->
  <alias>
    <family>Cascadia Mono</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>Cascadia Code</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <!-- Common Nerd variants you might use as primary -->
  <alias>
    <family>CaskaydiaCove Nerd Font</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>CaskaydiaMono Nerd Font</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>

  <alias>
    <family>Fira Mono</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>FiraCode Nerd Font</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>

  <alias>
    <family>JetBrains Mono</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>JetBrainsMono Nerd Font</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>

  <alias>
    <family>MesloLGS NF</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>MesloLGS Nerd Font</family>
    <prefer><family>DejaVuSansMono Nerd Font Mono</family></prefer>
  </alias>

</fontconfig>

